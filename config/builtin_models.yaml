# config/builtin_models.yaml — 声明式内置模型配置。
#
# 复制为 config/builtin_models.yaml（或将 BUILTIN_MODELS_CONFIG 指向自定义路径）
# 来启用。以下每个条目会以 is_builtin=true 插入到 `models` 表中，并对所有租户可见。
#
# 变量如何传入文件
# -----------------
# 任何字符串字段都可以用 ${变量名} 引用环境变量。未设置的环境变量将保留为字面值
# ${变量名}，这样配置错误会在上游 API 调用中清晰暴露，而非产生一个静默的空令牌。
# 非字符串字段（type、source、is_default、dimension、truncate_prompt_tokens）必须保留
# 字面值，因为 YAML 会按目标类型解析它们。
#
# 环境变量如何传入容器
# -------------------
# 默认情况下，docker-compose.yml 中的 app 服务通过以下方式加载 .env：
#   env_file:
#     - path: .env
#       required: false
# 因此你在 .env 中设置的任何内容都会自动传入容器。无需
# 在 `environment:` 下逐一列出每个变量。
#
# 每次应用启动时重新加载——编辑文件并重启即可使更改生效。
# 从文件中移除的条目不会自动从数据库中删除；如需删除请手动清理。

#builtin_models: []

# ----- 示例：基于环境变量的条目 — 取消注释并修改 --------------------------------
#
builtin_models:
  - id: builtin-llm-default
    type: KnowledgeQA          # KnowledgeQA | Embedding | Rerank | VLLM | ASR
    source: remote             # remote（默认）| local | ...
    is_default: true
    name: ${LLM_MODEL_NAME}
    parameters:
      base_url: ${LLM_BASE_URL}
      api_key: ${LLM_API_KEY}
      provider: ${LLM_PROVIDER}  # openai | generic | aliyun | moonshot | ...
#
  - id: builtin-embedding-default
    type: Embedding
    source: remote
    is_default: true
    name: ${EMBEDDING_MODEL_NAME}
    parameters:
      base_url: ${EMBEDDING_BASE_URL}
      api_key: ${EMBEDDING_API_KEY}
      provider: ${EMBEDDING_PROVIDER}
      embedding_parameters:
        dimension: 1024
        truncate_prompt_tokens: 0
#
  - id: builtin-rerank-default
    type: Rerank
    source: remote
    is_default: true
    name: ${RERANK_MODEL_NAME}
    parameters:
      base_url: ${RERANK_BASE_URL}
      api_key: ${RERANK_API_KEY}
      provider: ${RERANK_PROVIDER}
#
# ----- 示例：字面值配置（不使用环境变量间接引用）-------------------------------
