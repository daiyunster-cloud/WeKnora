# 智能推理模式的智能体类型预设
#
# 当用户创建/编辑自定义智能体并选择"smart-reasoning"模式时，
# 他们可以额外从以下列表中选择一个"智能体类型"。每种类型
# 捆绑了推荐的系统提示词模板、工具白名单和知识库
# 兼容性规则，这样用户无需从头配置所有内容。
#
# 用户始终可以覆盖任何自动填充的值——预设仅作为
# 表单的初始值。
#
# `kb_filter` 决定智能体编辑器允许用户在此类型下选择
# 哪些知识库。前端通过 GET /agents/type-presets 读取此配置，
# 并在客户端应用过滤。
#
# 支持的 kb_filter 谓词（针对知识库的 `capabilities` 进行评估）：
#   any_of:   知识库必须至少暴露列出的能力之一。
#   all_of:   知识库必须暴露列出的所有能力。
#   none_of:  知识库必须不暴露任何列出的能力。
# 能力名称：vector、keyword、wiki、graph、faq。
# 空的 kb_filter（或不设置 kb_filter）表示"允许任何知识库"。
#
# 注意：在默认的"工具驱动"模式下，前端通过 `deriveKbFilterFromTools`
# （参见 `frontend/src/utils/tool-capabilities.ts`）从 `config.allowed_tools`
# 推导出 any_of 谓词。只有当预设需要无法仅从工具推断的业务规则时
#（例如 data-analysis 上的 `none_of: [faq]`），才需要在此处编写
# 显式的 `kb_filter`。保持映射表精简，可避免此文件曾经存在的
# "双重真实来源"漂移问题。

agent_type_presets:
  # --------------------------------------------------------------------------
  # RAG 问答 — 基于分块索引的经典证据驱动检索。
  # 最适合无 Wiki 的文档 / FAQ 知识库。
  # --------------------------------------------------------------------------
  - id: "rag-qa"
    i18n:
      default:
        label: "RAG Q&A"
        description: "Evidence-based retrieval over document chunks. Best for document or FAQ KBs without Wiki."
      zh-CN:
        label: "RAG 问答"
        description: "基于文档分块的检索式问答，适合未启用 Wiki 的文档 / FAQ 知识库。"
      zh-TW:
        label: "RAG 問答"
        description: "基於文件分塊的檢索式問答，適合未啟用 Wiki 的文件 / FAQ 知識庫。"
    config:
      system_prompt_id: "progressive_rag_agent"
      temperature: 0.7
      max_iterations: 30
      # `thinking` 和 `todo_write` 故意默认不包含。
      # 它们对多步规划 / 自我反思很有用，但大多数
      # 用户单轮问答不需要它们，且它们会明显增加
      # token 消耗。需要时在工具列表中手动启用。
      allowed_tools:
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "get_document_info"
        - "final_answer"
      retain_retrieval_history: false
      faq_priority_enabled: true
      kb_selection_mode: "all"
    # kb_filter 从 allowed_tools 推导：any_of = [vector, keyword]

  # --------------------------------------------------------------------------
  # Wiki 问答 — 图谱导航的 Wiki 回答。
  # 仅在启用了 Wiki 的知识库上有意义。
  # --------------------------------------------------------------------------
  - id: "wiki-qa"
    i18n:
      default:
        label: "Wiki Q&A"
        description: "Wiki-first answering: search, read and follow links across wiki pages. Requires a Wiki-enabled KB."
      zh-CN:
        label: "Wiki 问答"
        description: "以 Wiki 为主的检索与图谱跳转回答，必须绑定已启用 Wiki 的知识库。"
      zh-TW:
        label: "Wiki 問答"
        description: "以 Wiki 為主的檢索與圖譜跳轉回答，必須綁定已啟用 Wiki 的知識庫。"
    config:
      system_prompt_id: "wiki_researcher"
      temperature: 0.7
      max_iterations: 30
      # `thinking` / `todo_write` 可在用户需要跨长链
      # wiki 导航时进行显式反思或规划时手动启用；
      # 默认不开启。
      allowed_tools:
        - "wiki_search"
        - "wiki_read_page"
        - "wiki_read_source_doc"
        - "wiki_flag_issue"
        - "final_answer"
      retain_retrieval_history: false
      kb_selection_mode: "all"
    # kb_filter 从 allowed_tools 推导：any_of = [wiki]

  # --------------------------------------------------------------------------
  # 混合 RAG + Wiki — 编排两种索引的单一智能体。
  # 需要同时暴露 wiki 和 (vector 或 keyword) 的知识库。
  # --------------------------------------------------------------------------
  - id: "hybrid-rag-wiki"
    i18n:
      default:
        label: "Hybrid (Wiki + RAG)"
        description: "Uses wiki pages for navigation and context, then drills into chunks for precise quotes. Requires KBs with BOTH Wiki and chunk indexing."
      zh-CN:
        label: "Wiki + RAG 混合"
        description: "先用 Wiki 建立导航和背景，再用分块检索精确引用。需绑定同时启用 Wiki 与向量/关键词索引的知识库。"
      zh-TW:
        label: "Wiki + RAG 混合"
        description: "先用 Wiki 建立導覽和背景，再用分塊檢索精確引用。需綁定同時啟用 Wiki 與向量/關鍵詞索引的知識庫。"
    config:
      system_prompt_id: "hybrid_rag_wiki_agent"
      temperature: 0.7
      max_iterations: 40
      # `thinking` 和 `todo_write` 是可选加入的。当用户希望
      # 在多跳混合搜索中进行显式自我反思或可见的分步计划时，
      # 手动开启。
      allowed_tools:
        - "wiki_search"
        - "wiki_read_page"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "get_document_info"
        - "wiki_flag_issue"
        - "final_answer"
      retain_retrieval_history: false
      faq_priority_enabled: true
      kb_selection_mode: "all"
    # 混合模式旨在成为最灵活的预设：智能体在运行时根据
    # 每个知识库暴露的能力自适应。
    #  - 知识库有 wiki + chunks  → 完整的"wiki 优先，RAG 验证"工作流
    #  - 知识库仅有 chunks       → 退回到纯 RAG（参见提示词中的"兜底规则"）
    #  - 知识库仅有 wiki         → 退回到仅 wiki 回答
    #  - FAQ 知识库              → 允许；knowledge_search 在 FAQ 块上仍可工作
    # kb_filter 从 allowed_tools 推导：any_of = [vector, keyword, wiki]。
    # 我们只要求知识库至少暴露一种可检索的索引面，这样智能体
    # 至少有东西可调用。零索引的知识库（如仅图谱或无任何索引）
    # 仍然被排除，因为没有工具能返回任何有用的结果。

  # --------------------------------------------------------------------------
  # 数据分析 — 对知识库中的表格文件（CSV / Excel）进行 SQL / 统计分析。
  # 检索能力（vector/wiki/…）在此基本无关——智能体
  # 驱动 `data_schema` + `data_analysis` 工具对上传的文件进行操作，
  # 因此我们通过 supported_file_types 而非知识库能力来筛选。
  # --------------------------------------------------------------------------
  - id: "data-analysis"
    i18n:
      default:
        label: "Data Analysis"
        description: "SQL queries and statistics over tabular files (CSV / Excel). Pair with a KB that holds data files."
      zh-CN:
        label: "数据分析"
        description: "对 CSV / Excel 等表格文件执行 SQL 查询和统计分析。请绑定包含数据文件的知识库。"
      zh-TW:
        label: "數據分析"
        description: "對 CSV / Excel 等表格檔案執行 SQL 查詢和統計分析。請綁定包含數據檔案的知識庫。"
    config:
      system_prompt_id: "data_analyst"
      temperature: 0.3
      max_iterations: 30
      # `thinking` / `todo_write` 对数据分析同样是可选加入的。
      # 当用户需要显式反思或将长的分析任务拆解为
      # 跟踪式子任务时，手动启用。
      allowed_tools:
        - "data_schema"
        - "data_analysis"
        - "final_answer"
      # retain_retrieval_history 在此无关——数据分析在
      # allowed_tools 中没有检索工具。保留默认值。
      web_search_enabled: false
      supported_file_types:
        - "csv"
        - "xlsx"
      kb_selection_mode: "all"
    # data_schema / data_analysis 工具读取 ChunkTypeTableSummary /
    # ChunkTypeTableColumn 块，这些块由正常的 RAG
    # 入库流水线（vector / keyword 索引）产生。any_of 谓词
    # 从 allowed_tools 自动推导；这里只需额外添加
    # FAQ 排除，因为这是一个工具映射表无法表达的业务规则
    #（FAQ 知识库技术上有 vector/keyword 块，但它们是问答对，
    # 而非表格数据，因此 data_schema 在它们上面会产出无用结果）。
    kb_filter:
      none_of: ["faq"]

  # --------------------------------------------------------------------------
  # 自定义 — 无预设；用户完全手动配置。
  # --------------------------------------------------------------------------
  - id: "custom"
    i18n:
      default:
        label: "Custom"
        description: "Full control. Manually pick tools, prompt and KB scope."
      zh-CN:
        label: "自定义"
        description: "完全自定义：自行选择工具、提示词和知识库。"
      zh-TW:
        label: "自訂"
        description: "完全自訂：自行選擇工具、提示詞和知識庫。"
    # 无 `config:` 块 → 预设不应用任何自动填充。
    # 无 `kb_filter:`    → 所有知识库均可选择。
