# Graph extraction prompt templates
# Used for knowledge graph entity and relationship extraction
templates:
  - id: "default_extract_entities"
    name: "Entity Extraction"
    description: "Extract entities from text for knowledge graph construction"
    default: true
    content: |
      ## 任务
      从用户提供的文本中提取所有匹配以下实体类型的实体：
      实体类型：[人物, 组织, 地点, 产品, 事件, 日期, 作品, 概念, 资源, 类别, 操作]

      ## 要求
      1. 输出必须为 JSON 数组格式
      2. 每个实体必须包含 title 和 type 字段；description 字段为可选但强烈推荐
      3. type 字段的值必须严格从实体类型列表中选择；不得创建新类型
      4. 若实体类型无法确定，不要强行归类；宁可不提取该实体
      5. 不要输出任何解释或额外内容；只输出 JSON 数组
      6. 所有字段值不得包含 HTML 标签或其他代码
      7. 若实体有歧义，请在 description 中注明参考依据
      8. 若未找到任何实体，返回空数组 []

      ## 实体提取规则
      - 人物：真实或虚构角色，包括历史人物、现代人物、文学人物等
      - 组织：公司、政府机构、团队、学校等组织实体
      - 地点：地理位置、地标、国家、城市等
      - 产品：商品、服务、品牌等商业产品
      - 事件：事件、会议、节日、历史事件等
      - 日期：日期、时间段、年代等时间相关信息
      - 作品：书籍、电影、音乐、艺术品等创作作品
      - 概念：抽象概念、思想、理论等
      - 资源：自然资源、信息资源、工具等
      - 类别：分类、类别、领域等
      - 操作：操作、动作、方法、流程等

      ## 提取步骤
      1. 仔细阅读文本，识别潜在实体
      2. 对每个识别出的实体，确定最合适的实体类型（必须从实体类型列表中选择）
      3. 为每个实体创建包含以下字段的 JSON 对象：
         - title：实体的标准名称，不含引号等修饰符
         - type：从实体类型列表中选择的实体类型
         - description：基于文本内容的实体简要描述，语言与源文本一致
      4. 验证每个实体的所有字段均正确且格式规范
      5. 将所有实体对象合并为单个 JSON 数组
      6. 检查最终 JSON 是否有效并符合要求

      ## 重要：语言规则
      - 按源文本中出现的原文提取实体标题
      - 使用 {{language}} 撰写描述

      ## 示例
      [输入]
      文本："《红楼梦》是曹雪芹创作的中国古典四大名著之一，以贾宝玉和林黛玉的爱情悲剧为主线，被誉为中国封建社会的百科全书。小说以贾府为背景，描写了贾、王、史、薛四大家族的兴衰史。"

      [输出]
      [
        {
          "title": "红楼梦",
          "type": "作品",
          "description": "曹雪芹创作的中国古典四大名著之一，以宝黛爱情悲剧为主线"
        },
        {
          "title": "曹雪芹",
          "type": "人物",
          "description": "《红楼梦》的作者"
        },
        {
          "title": "贾宝玉",
          "type": "人物",
          "description": "《红楼梦》的男主角，与林黛玉产生爱情"
        },
        {
          "title": "林黛玉",
          "type": "人物",
          "description": "《红楼梦》的女主角，与贾宝玉产生爱情"
        },
        {
          "title": "贾府",
          "type": "地点",
          "description": "《红楼梦》的主要场景，贾家的宅邸"
        },
        {
          "title": "贾家",
          "type": "组织",
          "description": "四大家族之一，《红楼梦》的核心家族"
        },
        {
          "title": "王家",
          "type": "组织",
          "description": "四大家族之一"
        },
        {
          "title": "史家",
          "type": "组织",
          "description": "四大家族之一"
        },
        {
          "title": "薛家",
          "type": "组织",
          "description": "四大家族之一"
        }
      ]

  - id: "default_extract_relationships"
    name: "Relationship Extraction"
    description: "Extract relationships between entities for knowledge graph construction"
    default: true
    content: |
      ## 任务
      从用户提供的实体数组中，提取实体之间的显式关系，形成结构化的关系网络。

      ## 要求
      1. 关系提取必须基于提供的文本内容；不得编造不存在的关系
      2. 输出必须为 JSON 数组格式，每个关系作为数组中的一个对象
      3. 每个关系对象必须包含 source、target、description 和 strength 字段
      4. 不要输出任何解释或额外内容；只输出 JSON 数组
      5. 若未找到任何关系，返回空数组 []

      ## 关系提取规则
      - 仅提取文本中明确存在的关系
      - 源实体和目标实体必须已是实体数组中的实体
      - 关系描述应简洁说明两个实体之间的具体关联
      - 关系强度应根据以下标准确定：
        * 10：直接创建/从属关系（如作者与作品、发明者与发明、母公司与子公司）
        * 9：同一实体的不同表现形式（如别名、曾用名）
        * 8：紧密关联且相互影响的关系（如亲密合作伙伴、家庭成员）
        * 7：明确但非直接的关系（如作品中的人物、组织的成员）
        * 6：有明确关联但间接的关系（如同事关系、相似产品）
        * 5：相关但关联松散的关系（如同一领域的不同概念）

      ## 提取步骤
      1. 仔细分析文本内容，判断哪些实体之间存在明确的关系
      2. 仅考虑文本中明确提及的关系；不得编造
      3. 对于每条发现的关系，确定：
         - source：源实体的标题（必须是实体列表中已有的实体）
         - target：目标实体的标题（必须是实体列表中已有的实体）
         - description：简洁准确的关系描述
         - strength：基于上述标准的关系强度（5-10 之间的整数）
      4. 检查每条关系是否双向：
         - 若关系是双向的（如"A 是 B 的朋友"意味着"B 也是 A 的朋友"），考虑是否应创建反向关系
         - 若关系是单向的（如"A 创建了 B"），仅保留单向关系
      5. 验证所有关系的一致性和合理性：
         - 确保没有矛盾关系（如 A 同时是 B 的父亲和兄弟）
         - 确保关系描述与关系强度匹配
      6. 将所有有效关系整理为 JSON 数组

      ## 重要：语言规则
      - 使用 {{language}} 撰写关系描述

      ## 示例
      [输入]
      实体：[
        {
          "title": "红楼梦",
          "type": "作品",
          "description": "曹雪芹创作的中国古典四大名著之一，以宝黛爱情悲剧为主线"
        },
        {
          "title": "曹雪芹",
          "type": "人物",
          "description": "《红楼梦》的作者"
        },
        {
          "title": "贾宝玉",
          "type": "人物",
          "description": "《红楼梦》的男主角，与林黛玉产生爱情"
        },
        {
          "title": "林黛玉",
          "type": "人物",
          "description": "《红楼梦》的女主角，与贾宝玉产生爱情"
        },
        {
          "title": "贾府",
          "type": "地点",
          "description": "《红楼梦》的主要场景，贾家的宅邸"
        },
        {
          "title": "贾家",
          "type": "组织",
          "description": "四大家族之一，《红楼梦》的核心家族"
        },
        {
          "title": "薛家",
          "type": "组织",
          "description": "四大家族之一"
        }
      ]

      文本："《红楼梦》是曹雪芹创作的中国古典四大名著之一，以贾宝玉和林黛玉的爱情悲剧为主线，被誉为中国封建社会的百科全书。小说以贾府为背景，描写了贾、王、史、薛四大家族的兴衰史。"

      [输出]
      [
        {
          "source": "曹雪芹",
          "target": "红楼梦",
          "description": "曹雪芹是《红楼梦》的作者",
          "strength": 10
        },
        {
          "source": "贾宝玉",
          "target": "林黛玉",
          "description": "贾宝玉与林黛玉产生了深厚的爱情",
          "strength": 8
        },
        {
          "source": "贾宝玉",
          "target": "贾家",
          "description": "贾宝玉是贾家的成员",
          "strength": 8
        },
        {
          "source": "林黛玉",
          "target": "贾家",
          "description": "林黛玉寄居在贾府",
          "strength": 7
        },
        {
          "source": "红楼梦",
          "target": "贾宝玉",
          "description": "贾宝玉是《红楼梦》的男主角",
          "strength": 7
        },
        {
          "source": "红楼梦",
          "target": "林黛玉",
          "description": "林黛玉是《红楼梦》的女主角",
          "strength": 7
        },
        {
          "source": "红楼梦",
          "target": "贾府",
          "description": "小说以贾府为主要场景",
          "strength": 6
        },
        {
          "source": "贾家",
          "target": "薛家",
          "description": "贾家与薛家同属四大家族，关系密切",
          "strength": 6
        }
      ]
