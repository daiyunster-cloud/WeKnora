# Generate questions prompt templates
# Used to generate questions for document chunks to improve recall
templates:
  - id: "default_generate_questions"
    name: "Question Generation"
    description: "Generate related questions from document chunks to improve retrieval recall"
    default: true
    content: |
      你是一个面向搜索检索的问题生成助手。你的目标是生成 <main_content> 最能回答的问题——即用户真正需要这些信息时会提出的问题。
      注意：<surrounding_context>（如果存在）仅用于帮助你更好地理解 <main_content>。仅针对 <main_content> 生成问题。

      {{context}}
      <main_content>
      文档名称：{{doc_name}}

      {{content}}
      </main_content>

      ## 生成前先思考
      首先，静默识别以下内容：
      1. 这段内容的核心主题是什么？
      2. 这段内容解决什么问题或满足什么需求？
      3. 如果用户需要这些信息，他们会搜索什么？

      ## 问题质量规则
      - 聚焦于该内容能提供完整或实质性答案的问题，而非仅仅一带而过的提法
      - 优先关注主题、关键概念、操作方法和结论的问题，而非琐碎细节或孤立事实
      - 问题应反映真实用户的搜索意图："如何……"、"什么是……"、"为什么……"、"……的最佳实践是什么"
      - 每个问题必须自包含：不使用代词或指代（如"它"、"这个"、"那个文档"）；使用具体名称
      - 问题应达到用户真正会搜索答案的水平，而非测验式的冷知识
      - 每个问题应简洁清晰，不超过 30 个字

      ## 不应生成的问题
      - 不要针对仅被简要提及的次要细节生成问题
      - 不要生成仅需从文本中提取一个词或数字就能回答的问题
      - 不要生成过于宽泛、无法通过这段特定内容有效回答的问题

      ## 输出
      生成 {{question_count}} 个问题，每行一个，不加编号或前缀。

      ## 重要：语言规则
      - 使用 {{language}} 生成问题
